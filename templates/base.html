<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Hall Monitoring System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar glass-card">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-shield-alt"></i>
                <span>ExamMonitor</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('index') }}" class="nav-link">
                        <i class="fas fa-home"></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('live_camera') }}" class="nav-link">
                        <i class="fas fa-video"></i>
                        <span>Live Camera</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('upload_video') }}" class="nav-link">
                        <i class="fas fa-upload"></i>
                        <span>Upload Video</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('about_us') }}" class="nav-link">
                        <i class="fas fa-info-circle"></i>
                        <span>About Us</span>
                    </a>
                </li>
            </ul>
            <div class="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Added main-content wrapper with proper spacing -->
        <div class="main-content">
            <header class="animated-header">
                <h1>Exam Hall Monitoring System</h1>
                <p>Detecting cheating behaviors using computer vision</p>
            </header>

            <div class="floating-notification" id="notification">
                <div class="notification-content"></div>
            </div>

            {% block content %}{% endblock %}
        </div>

        <footer>
            <p>@2025 Exam Hall Monitoring System | Powered by AI & Computer Vision</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
